# Lefthook git hooks configuration
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: false
  commands:
    biome-format-staged:
      priority: 1
      root: extensions/
      glob:
        - "**/*.{js,cjs,mjs,jsx,ts,tsx,json,jsonc,yml,yaml}"
      run: pnpm exec biome format --write {staged_files}
      stage_fixed: true
      skip:
        - merge
        - rebase
    biome-check:
      priority: 2
      root: extensions/
      run: pnpm exec biome check --error-on-warnings --reporter=summary .
      skip:
        - merge
        - rebase
    typecheck:
      priority: 3
      root: extensions/
      run: pnpm run typecheck
      skip:
        - merge
        - rebase

pre-push:
  commands:
    test:
      root: extensions/
      run: pnpm run test
