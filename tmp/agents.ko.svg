    <text x="100" y="56" text-anchor="middle" fill="#e6edf3" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="9">브라우저</text>
    <text x="100" y="70" text-anchor="middle" fill="#e6edf3" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="9">자동화</text>
    <circle cx="185" cy="14" r="5" fill="#bc8cff" opacity="0.6"/>
  </g>

  <!-- MIDDLE ROW (2 agents) -->

  <!-- searcher: claude-sonnet-4-6, blue — left -->
  <g transform="translate(0, 305)">
    <rect width="200" height="80" rx="10" fill="rgba(88,166,255,0.08)" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="100" y="22" text-anchor="middle" fill="#58a6ff" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="13" font-weight="bold">🌐 searcher</text>
    <text x="100" y="40" text-anchor="middle" fill="#8b949e" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="7">claude-sonnet-4-6</text>
    <text x="100" y="56" text-anchor="middle" fill="#e6edf3" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="9">웹 리서치</text>
    <text x="100" y="70" text-anchor="middle" fill="#e6edf3" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="9">·조사</text>
    <circle cx="185" cy="14" r="5" fill="#58a6ff" opacity="0.6"/>
  </g>

  <!-- reviewer: gpt-5.3-codex, orange — right -->
  <g transform="translate(1000, 305)">
    <rect width="200" height="80" rx="10" fill="rgba(240,136,62,0.08)" stroke="#f0883e" stroke-width="1.5"/>
    <text x="100" y="22" text-anchor="middle" fill="#f0883e" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="13" font-weight="bold">🔎 reviewer</text>
    <text x="100" y="40" text-anchor="middle" fill="#8b949e" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="7">gpt-5.3-codex</text>
    <text x="100" y="56" text-anchor="middle" fill="#e6edf3" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="9">코드</text>
    <text x="100" y="70" text-anchor="middle" fill="#e6edf3" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="9">리뷰</text>
    <circle cx="185" cy="14" r="5" fill="#f0883e" opacity="0.6"/>
  </g>

  <!-- BOTTOM ROW (4 agents) -->

  <!-- challenger: claude-sonnet-4-6, purple -->
  <g transform="translate(100, 505)">
    <rect width="200" height="80" rx="10" fill="rgba(188,140,255,0.08)" stroke="#bc8cff" stroke-width="1.5"/>
    <text x="100" y="22" text-anchor="middle" fill="#bc8cff" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="13" font-weight="bold">🥊 challenger</text>
    <text x="100" y="40" text-anchor="middle" fill="#8b949e" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="7">claude-sonnet-4-6</text>
    <text x="100" y="56" text-anchor="middle" fill="#e6edf3" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="9">스트레스</text>
    <text x="100" y="70" text-anchor="middle" fill="#e6edf3" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="9">테스터</text>
    <circle cx="185" cy="14" r="5" fill="#bc8cff" opacity="0.6"/>
  </g>

  <!-- verifier: claude-sonnet-4-6, purple -->
  <g transform="translate(380, 505)">
    <rect width="200" height="80" rx="10" fill="rgba(188,140,255,0.08)" stroke="#bc8cff" stroke-width="1.5"/>
    <text x="100" y="22" text-anchor="middle" fill="#bc8cff" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="13" font-weight="bold">✅ verifier</text>
    <text x="100" y="40" text-anchor="middle" fill="#8b949e" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="7">claude-sonnet-4-6</text>
    <text x="100" y="56" text-anchor="middle" fill="#e6edf3" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="9">3단계</text>
    <text x="100" y="70" text-anchor="middle" fill="#e6edf3" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="9">검증</text>
    <circle cx="185" cy="14" r="5" fill="#bc8cff" opacity="0.6"/>
  </g>

  <!-- deep-verify: gpt-5.3-codex, orange -->
  <g transform="translate(620, 505)">
    <rect width="200" height="80" rx="10" fill="rgba(240,136,62,0.08)" stroke="#f0883e" stroke-width="1.5"/>
    <text x="100" y="22" text-anchor="middle" fill="#f0883e" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="13" font-weight="bold">🔬 deep-verify</text>
    <text x="100" y="40" text-anchor="middle" fill="#8b949e" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="7">gpt-5.3-codex</text>
    <text x="100" y="56" text-anchor="middle" fill="#e6edf3" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="9">고위험</text>
    <text x="100" y="70" text-anchor="middle" fill="#e6edf3" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="9">심층검증</text>
    <circle cx="185" cy="14" r="5" fill="#f0883e" opacity="0.6"/>
  </g>

  <!-- decider: gpt-5.3-codex, orange -->
  <g transform="translate(900, 505)">
    <rect width="200" height="80" rx="10" fill="rgba(240,136,62,0.08)" stroke="#f0883e" stroke-width="1.5"/>
    <text x="100" y="22" text-anchor="middle" fill="#f0883e" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="13" font-weight="bold">⚖️ decider</text>
    <text x="100" y="40" text-anchor="middle" fill="#8b949e" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="7">gpt-5.3-codex</text>
    <text x="100" y="56" text-anchor="middle" fill="#e6edf3" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="9">기술</text>
    <text x="100" y="70" text-anchor="middle" fill="#e6edf3" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="9">의사결정</text>
    <circle cx="185" cy="14" r="5" fill="#f0883e" opacity="0.6"/>
  </g>

  <!-- Legend -->
  <g transform="translate(30, 665)" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="10">
    <circle cx="8" cy="6" r="5" fill="#58a6ff" opacity="0.8"/>
    <text x="20" y="10" fill="#8b949e">claude-sonnet-4-6</text>
    <circle cx="220" cy="6" r="5" fill="#4fb4a5" opacity="0.8"/>
    <text x="232" y="10" fill="#8b949e">claude-haiku-4-5</text>
    <circle cx="400" cy="6" r="5" fill="#bc8cff" opacity="0.8"/>
    <text x="412" y="10" fill="#8b949e">purple = 범용/검증</text>
    <circle cx="620" cy="6" r="5" fill="#f0883e" opacity="0.8"/>
    <text x="632" y="10" fill="#8b949e">gpt-5.3-codex = 구조적 추론</text>
  </g>
</svg>
