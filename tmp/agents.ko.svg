<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <defs>
    <filter id="aglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="abgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#010409"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(139,148,88,0.08)"/>
      <stop offset="100%" stop-color="rgba(13,17,23,0)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="url(#abgGrad)" rx="12"/>

  <!-- Subtle radial glow behind center -->
  <circle cx="600" cy="350" r="250" fill="url(#centerGlow)"/>

  <!-- Title -->
  <text x="600" y="35" text-anchor="middle" fill="#e6edf3" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="18" font-weight="bold">🤖 에이전트 오케스트라 (11개)</text>

  <!-- Connection lines (behind nodes) -->
  <g stroke="#21262d" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.5">
    <!-- Top row -->
    <line x1="600" y1="350" x2="150" y2="140"/>
    <line x1="600" y1="350" x2="420" y2="140"/>
    <line x1="600" y1="350" x2="600" y2="140"/>
    <line x1="600" y1="350" x2="780" y2="140"/>
    <line x1="600" y1="350" x2="1050" y2="140"/>
    <!-- Middle row -->
    <line x1="600" y1="350" x2="100" y2="350"/>
    <line x1="600" y1="350" x2="1100" y2="350"/>
    <!-- Bottom row -->
    <line x1="600" y1="350" x2="200" y2="560"/>
    <line x1="600" y1="350" x2="480" y2="560"/>
    <line x1="600" y1="350" x2="720" y2="560"/>
    <line x1="600" y1="350" x2="1000" y2="560"/>
  </g>

  <!-- Center: Main Orchestrator -->
  <rect x="495" y="310" width="210" height="80" rx="12" fill="rgba(230,237,243,0.08)" stroke="#e6edf3" stroke-width="2" filter="url(#aglow)"/>
  <text x="600" y="340" text-anchor="middle" fill="#e6edf3" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="14" font-weight="bold">메인 오케스트레이터</text>
  <text x="600" y="360" text-anchor="middle" fill="#8b949e" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="9">claude-sonnet-4-6</text>

  <!-- TOP ROW (5 agents) -->
  
  <!-- finder: claude-sonnet-4-6, blue -->
  <g transform="translate(50, 80)">
    <rect width="200" height="80" rx="10" fill="rgba(88,166,255,0.08)" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="100" y="22" text-anchor="middle" fill="#58a6ff" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="13" font-weight="bold">🔍 finder</text>
    <text x="100" y="40" text-anchor="middle" fill="#8b949e" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="7">claude-sonnet-4-6</text>
    <text x="100" y="56" text-anchor="middle" fill="#e6edf3" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="9">빠른 파일·코드</text>
    <text x="100" y="70" text-anchor="middle" fill="#e6edf3" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="9">탐색</text>
    <circle cx="185" cy="14" r="5" fill="#58a6ff" opacity="0.6"/>
  </g>

  <!-- worker-fast: claude-haiku-4-5, cyan -->
  <g transform="translate(320, 80)">
    <rect width="200" height="80" rx="10" fill="rgba(79,180,165,0.08)" stroke="#4fb4a5" stroke-width="1.5"/>
    <text x="100" y="22" text-anchor="middle" fill="#4fb4a5" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="13" font-weight="bold">🏃 worker-fast</text>
    <text x="100" y="40" text-anchor="middle" fill="#8b949e" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="7">claude-haiku-4-5</text>
    <text x="100" y="56" text-anchor="middle" fill="#e6edf3" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="9">경량 단순</text>
    <text x="100" y="70" text-anchor="middle" fill="#e6edf3" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="9">작업</text>
    <circle cx="185" cy="14" r="5" fill="#4fb4a5" opacity="0.6"/>
  </g>

  <!-- worker: claude-sonnet-4-6, purple -->
  <g transform="translate(500, 80)">
    <rect width="200" height="80" rx="10" fill="rgba(188,140,255,0.08)" stroke="#bc8cff" stroke-width="1.5"/>
    <text x="100" y="22" text-anchor="middle" fill="#bc8cff" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="13" font-weight="bold">⚡ worker</text>
    <text x="100" y="40" text-anchor="middle" fill="#8b949e" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="7">claude-sonnet-4-6</text>
    <text x="100" y="56" text-anchor="middle" fill="#e6edf3" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="9">범용 작업</text>
    <text x="100" y="70" text-anchor="middle" fill="#e6edf3" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="9">실행기</text>
    <circle cx="185" cy="14" r="5" fill="#bc8cff" opacity="0.6"/>
  </g>

  <!-- planner: gpt-5.3-codex, orange -->
  <g transform="translate(680, 80)">
    <rect width="200" height="80" rx="10" fill="rgba(240,136,62,0.08)" stroke="#f0883e" stroke-width="1.5"/>
    <text x="100" y="22" text-anchor="middle" fill="#f0883e" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="13" font-weight="bold">📐 planner</text>
    <text x="100" y="40" text-anchor="middle" fill="#8b949e" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="7">gpt-5.3-codex</text>
    <text x="100" y="56" text-anchor="middle" fill="#e6edf3" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="9">구현</text>
    <text x="100" y="70" text-anchor="middle" fill="#e6edf3" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="9">설계자</text>
    <circle cx="185" cy="14" r="5" fill="#f0883e" opacity="0.6"/>
  </g>

