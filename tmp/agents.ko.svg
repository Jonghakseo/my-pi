    <rect width="200" height="80" rx="10" fill="rgba(188,140,255,0.08)" stroke="#bc8cff" stroke-width="1.5"/>
    <text x="100" y="22" text-anchor="middle" fill="#bc8cff" font-family="monospace, 'Noto Sans KR', sans-serif" font-size="13" font-weight="bold">🖥️ browser</text>
